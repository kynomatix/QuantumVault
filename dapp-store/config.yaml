# =============================================================================
# QuantumVault — Solana dApp Store publishing config
# =============================================================================
# This file is consumed by the Solana Mobile dApp Store CLI
# (@solana-mobile/dapp-store-cli). See PUBLISHING.md for the full step-by-step.
#
# FILL IN every <ANGLE_BRACKET> placeholder before publishing.
# Do NOT change `android_package` — it must stay identical to the value baked
# into the signed APK and served at https://myquantumvault.com/.well-known/assetlinks.json
# (com.myquantumvault.app), or Android app-link verification will hard-fail.
#
# The `address:` fields are filled in AUTOMATICALLY by the CLI after each mint
# (publisher / app / release). Leave them blank on first run.
# =============================================================================

publisher:
  name: QuantumVault            # e.g. "QuantumVault" or your company name
  website: https://myquantumvault.com
  email: jayse@myquantumvault.com            # support/contact email (shown to reviewers)
  # address: <auto-filled by `dapp-store create publisher`>
  media:
    - purpose: icon
      uri: ./media/app_icon.png          # 512x512 PNG (provided)

app:
  name: QuantumVault
  android_package: com.myquantumvault.app   # DO NOT CHANGE
  url: https://myquantumvault.com
  # address: <auto-filled by `dapp-store create app`>
  media:
    - purpose: icon
      uri: ./media/app_icon.png          # 512x512 PNG (provided)

release:
  # address: <auto-filled by `dapp-store create release`>
  media:
    - purpose: icon
      uri: ./media/app_icon.png          # 512x512 PNG (provided)

    # --- Screenshots: REQUIRED. Provide at least 4. -----------------------
    # Capture on a phone (Seeker/Android) at native resolution. Portrait PNG/JPG.
    # Drop them in dapp-store/media/ and keep these paths in sync.
    - purpose: screenshot
      uri: ./media/Screenshot_1.jpg
    - purpose: screenshot
      uri: ./media/Screenshot_2.jpg
    - purpose: screenshot
      uri: ./media/Screenshot_3.jpg
    - purpose: screenshot
      uri: ./media/Screenshot_4.jpg

    # --- Banner / feature graphic ----------------------------------------
    # Roughly 2:1 (1200x600). Filename must match the file on disk exactly.
    - purpose: banner
      uri: ./media/Banner.jpg

  files:
    - purpose: install
      uri: ./files/app-release-signed.apk   # copy the signed APK here first

  catalog:
    en-US:
      # name: max 30 chars
      name: QuantumVault
      # short_description: max 30 chars
      short_description: Automated Solana perp bots
      # long_description: max ~4000 chars (see LISTING.md to edit comfortably)
      long_description: >
        QuantumVault is a Solana-native platform for automated perpetual futures
        trading. Deploy and manage trading bots that run your strategies around
        the clock, turn TradingView alerts into live trades, and track every
        position, PnL figure, and account-health metric in real time.


        Key features:

        - Automated bot trading — deploy perpetual futures bots with hands-free execution.

        - Real-time tracking — live positions, PnL, margin and account-health metrics.

        - TradingView webhooks — convert your alerts into live trades automatically.

        - Signal marketplace — publish your own signal bots or subscribe to others, with profit sharing for creators.

        - QuantumLab backtesting — test and optimize Pine Script strategies before going live.

        - Secure key management — server-managed wallets with encrypted keys under your control.

        - Telegram notifications — configurable trade and account alerts.


        Connect your Solana wallet and automate your perp trading from your phone.
      new_in_version: Initial release of QuantumVault on the Solana dApp Store.
      saga_features: >
        Native Mobile Wallet Adapter support — connect your Seeker or Saga wallet
        in one tap and manage your trading bots on the go.
      copyright: © 2026 QuantumVault

# Optional: extra info sent to the Solana Mobile dApp Publisher Portal reviewers.
solana_mobile_dapp_publisher_portal:
  google_store_package:                  # leave blank — not on Google Play
  testing_instructions: >
    QuantumVault is a Trusted Web Activity that loads https://myquantumvault.com.
    To exercise the app: open it, tap Connect Wallet (Mobile Wallet Adapter),
    approve the connection in your wallet, and the dashboard, bots, and positions
    views will load.
